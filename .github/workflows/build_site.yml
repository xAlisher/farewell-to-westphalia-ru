name: Build Site

on:
  push:
    branches: [main]
    paths:
      - 'translations/ru/**'
      - 'build_site.py'
      - 'docs/assets/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python build_site.py

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "build: regenerate site from translations"
          git push
