name: "Замечание к переводу"
description: "Сообщить об ошибке или предложить улучшение перевода"
title: "[Глава ]: "
labels: ["перевод"]
body:
  - type: dropdown
    id: chapter
    attributes:
      label: Глава
      description: К какой главе относится замечание?
      options:
        - "00 — Благодарности"
        - "01 — Введение"
        - "02 — Национальные государства — устаревшие технологии управления"
        - "03 — Постгосударственное управление"
        - "04 — Новые концептуальные основания"
        - "05 — Технические основы децентрализованного сотрудничества"
        - "06 — Новые инструменты для управления человеческим обществом"
        - "07 — Почему централизация — проблема, а криптовалюты — решение"
        - "08 — Кибергосударства — ответ?"
        - "09 — Выход, изгнание и доступ"
        - "10 — Переосмысление суверенитета"
        - "11 — Права и обязанности блокчейн-сообществ"
        - "12 — Как блокчейн-сообщества будут сотрудничать"
        - "13 — Когда блокчейн-сообщества в конфликте"
        - "14 — Глубже в технологию"
        - "15 — Концептуальные пределы блокчейн-управления"
        - "16 — Неизбежны ли блокчейн-сообщества?"
        - "17 — Ценности и технологический стек"
        - "Общее / несколько глав"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Тип замечания
      options:
        - "ОШИБКА — смысл оригинала искажён"
        - "СТИЛЬ — фраза режет слух, но смысл верный"
        - "ТЕРМИН — вопрос по терминологии"
        - "АУДИО — сложно для произношения диктором"
        - "ВОПРОС — не уверен, нужна помощь"
    validations:
      required: true

  - type: textarea
    id: original
    attributes:
      label: Текст в переводе
      description: Скопируйте фрагмент перевода, к которому есть замечание
      placeholder: "«Управление в человеческом обществе означает…»"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Предлагаемое исправление
      description: Как, по вашему мнению, должно быть?
      placeholder: "Лучше: «Управление обществом означает…»"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Контекст / пояснение
      description: Почему вы считаете это ошибкой или стоит изменить?
      placeholder: "В оригинале governance здесь означает контроль над протоколом, а не государственное управление"
    validations:
      required: false
