human governance:
  preferred: координация людей
  allowed:
    - человеческое управление (координация людей)
    - управление людьми
  notes: >-
    Первое упоминание допускает разъяснение «человеческое управление (координация людей)».
    «Управление людьми» допустимо только в контексте критики государственной власти,
    принуждения или традиционных структур управления. В сочетаниях предпочтительны
    глаголы «согласовывать действия», «координировать», «совместно принимать решения»,
    избегая конструкций контроля над субъектом.
  rationale: >-
    «Координация людей» сохраняет смысл совместного согласования действий без
    иерархического оттенка и лучше воспринимается на слух.
cooperative human governance:
  preferred: совместная координация людей
  allowed: []
  notes: Подчеркивает совместный характер координации без вертикального контроля.
  rationale: >-
    Сохраняет ключевой термин «координация людей» и добавляет признак совместности.
governance:
  preferred: управление
  allowed: []
  notes: Общий термин вне специфически государственного контекста.
  rationale: >-
    «Управление» остается нейтральным базовым эквивалентом для governance.
governance (state context):
  preferred: управление
  allowed:
    - государственное управление
  notes: >-
    «Государственное управление» использовать при прямой отсылке к институтам государства.
  rationale: >-
    Разделяет нейтральное «управление» и более точное обозначение государственных структур.
sovereign nation states:
  preferred: суверенные национальные государства
  allowed: []
  notes: Использовать в форме множественного числа для сохранения исходного смысла.
  rationale: >-
    Точная калька без утраты политико-правового значения.
nation-state:
  preferred: национальное государство
  allowed: []
  notes: Единичная форма базового термина.
  rationale: >-
    Сохраняет распространенный политологический эквивалент.
sovereignty:
  preferred: суверенитет
  allowed: []
  notes: Базовый термин.
  rationale: >-
    Стандартный юридико-политический эквивалент.
human technologies:
  preferred: человеческие технологии
  allowed: []
  notes: Использовать как термин о практиках и инструментах, связанных с человеческим взаимодействием.
  rationale: >-
    Сохраняет буквальный смысл и нейтральную стилистику.
political organisation:
  preferred: политическая организация
  allowed: []
  notes: Без изменения числа и рода при необходимости.
  rationale: >-
    Прямой и понятный эквивалент.
blockchain technologies:
  preferred: блокчейн-технологии
  allowed: []
  notes: С дефисом.
  rationale: >-
    Устоявшееся написание в русскоязычных источниках.
smart contracts:
  preferred: смарт-контракты
  allowed: []
  notes: Не переводить на «умные контракты» в этом проекте.
  rationale: >-
    Сохраняет общепринятую форму без излишней кальки.
decentralization:
  preferred: децентрализация
  allowed: []
  notes: Базовый термин.
  rationale: >-
    Прямой терминологический эквивалент.
decentralized cooperation:
  preferred: децентрализованное сотрудничество
  allowed: []
  notes: Базовый термин.
  rationale: >-
    Точная калька, легко читается.
single point of failure:
  preferred: единая точка отказа
  allowed: []
  notes: Технический термин.
  rationale: >-
    Устойчивый перевод в технической литературе.
immutable records:
  preferred: неизменяемые записи
  allowed: []
  notes: Базовый термин.
  rationale: >-
    Сохраняет смысл и нейтральный стиль.
crypto sovereignty:
  preferred: криптосуверенитет
  allowed: []
  notes: Использовать без дефиса.
  rationale: >-
    Утвержденное решение по терминологии.
